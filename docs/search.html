    .wrap{max-width:920px;margin:32px auto;padding:0 20px}.actions{display:flex;justify-content:flex-end;margin-bottom:12px}.actions button{border:0;background:#4f46e5;color:#fff;border-radius:10px;padding:10px 14px;cursor:pointer}.card{background:#fff;border:1px solid #e5e7eb;border-radius:18px;padding:28px;box-shadow:0 10px 30px rgba(15,23,42,.06)}

<body id="top"><header class="topbar"><div class="inner"><strong>SPARC Docs</strong><nav><a href="./index.html">首页</a><a href="./sparc-usage-guideline.html">使用规范</a><a href="./prompt-template-library.html">提示词模板库</a><a href="./tdd-guideline.html">TDD 规范</a><a href="./high-risk-task-guideline.html">高风险任务规范</a><a class="current" href="./search.html">站内搜索</a></nav></div></header><main class="wrap"><div class="actions"><button onclick="window.print()">打印 / 导出 PDF</button></div><article class="card"><p class="breadcrumbs"><a href="./index.html">首页</a> / <span>站内搜索</span></p><h1>站内搜索</h1><p class="muted">Owner：Engineering Productivity · 版本：v1.0 · 生效日期：2026-05-21</p><div class="callout"><strong>使用方式：</strong>输入关键词后，将在当前文档站的核心页面中做轻量级前端检索。</div><div class="searchbox"><input id="q" type="text" placeholder="搜索：TDD、提示词、重构、review、swarm…"><button type="button" onclick="runSearch()">搜索</button></div><div id="results"></div><div class="pager"><a href="./high-risk-task-guideline.html"><strong>上一篇：高风险任务处理规范</strong><span>回看高风险任务的处理要求</span></a><a href="./index.html"><strong>下一篇：文档首页</strong><span>返回文档中心入口</span></a></div><p>Owner：Engineering Productivity · 版本：v1.0 · 生效日期：2026-05-21 · 最后更新：2026-05-21 · <a href="#top">返回顶部</a></p></article></main><script>const docs=[{title:'SPARC 使用规范',url:'./sparc-usage-guideline.html',text:'入口模式 专家模式 orchestrator swarm-coordinator tdd 规则 复杂任务 小任务 决策树 反模式 场景矩阵'},{title:'提示词模板库',url:'./prompt-template-library.html',text:'提示词 模板 coder tester reviewer orchestrator swarm-coordinator 多智能体 tdd 补测试'},{title:'TDD 规范',url:'./tdd-guideline.html',text:'TDD tester coder reviewer failing tests review clear red confirmed test plan ready'},{title:'高风险任务处理规范',url:'./high-risk-task-guideline.html',text:'高风险 重构 安全 兼容性 公共库 reviewer tester orchestrator swarm-coordinator'}];function runSearch(){const q=document.getElementById('q').value.trim().toLowerCase();const box=document.getElementById('results');if(!q){box.innerHTML='<p class="muted">请输入关键词开始搜索。</p>';return;}const hits=docs.filter(d=>(d.title+d.text).toLowerCase().includes(q));box.innerHTML=hits.length?hits.map(d=>`<div class="result"><strong><a href="${d.url}">${d.title}</a></strong><p>${d.text}</p></div>`).join(''):'<p class="muted">未找到匹配结果，请尝试更短或更通用的关键词。</p>';}document.getElementById('q').addEventListener('keydown',e=>{if(e.key==='Enter')runSearch();});</script></body></html>
